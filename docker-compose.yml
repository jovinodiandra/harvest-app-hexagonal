services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ternaklele-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ternaklele}
      POSTGRES_USER: ${POSTGRES_USER:-ternaklele}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ternaklele123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ternaklele} -d ${POSTGRES_DB:-ternaklele}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ternaklele-network

  # Backend Spring Boot Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ternaklele-backend
    environment:
      # Database configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ternaklele}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ternaklele}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ternaklele123}
      # JWT configuration
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      # Server configuration
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api-docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - ternaklele-network

  # Frontend Svelte Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
        VITE_USE_MOCK_API: "false"
    container_name: ternaklele-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ternaklele-network

volumes:
  postgres_data:

networks:
  ternaklele-network:
    driver: bridge
